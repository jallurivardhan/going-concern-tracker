name: Accuracy Benchmark

# Triggered automatically on PRs that touch the classifier, parser, or eval set.
# The benchmark reads GoingConcernFlag rows from the database — it never calls
# the live LLM.  Cost per run: $0.00.
#
# NOTE: This workflow requires a DATABASE_URL secret pointing to a database that
# has been pre-populated with the ingested and classified filings.  The
# ANTHROPIC_API_KEY is included here for future use (Phase 3 re-classification
# on demand) but is not consumed by the benchmark itself.

on:
  pull_request:
    paths:
      - 'apps/api/src/gct/classifier/**'
      - 'apps/api/src/gct/ingestion/filing_parser.py'
      - 'apps/api/eval/**'
      - 'apps/api/tests/test_benchmark.py'

jobs:
  # ── Unit tests (no DB required) ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost/placeholder"
        run: |
          cd apps/api
          python -m pytest tests/test_benchmark.py -v

  # ── Accuracy benchmark (DB required) ────────────────────────────────────────
  eval:
    name: Accuracy Benchmark (strict mode)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run if DATABASE_URL secret is configured
    if: ${{ secrets.DATABASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Run accuracy benchmark (strict mode)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
        run: |
          cd apps/api
          python -m gct.cli.eval \
            --strict \
            --save-report apps/api/eval/reports/pr-${{ github.event.pull_request.number }}.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()  # upload even on failure so we can inspect regressions
        with:
          name: eval-report-pr-${{ github.event.pull_request.number }}
          path: apps/api/eval/reports/*.json
          retention-days: 30

  # ── Eval set integrity check ─────────────────────────────────────────────────
  eval-set-lint:
    name: Eval Set Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate golden_set.json structure
        run: |
          python - << 'EOF'
          import json, sys
          from pathlib import Path
          data = json.loads(Path("apps/api/eval/golden_set.json").read_text())
          required_keys = {"version", "created_at", "labeler", "cases"}
          assert required_keys <= data.keys(), f"Missing top-level keys: {required_keys - data.keys()}"
          case_keys = {"case_id", "company_cik", "filing_accession", "expected_severity",
                       "labeler_justification", "expected_has_going_concern"}
          for i, c in enumerate(data["cases"]):
              missing = case_keys - c.keys()
              assert not missing, f"Case {i} ({c.get('case_id')}) missing keys: {missing}"
          print(f"OK: {len(data['cases'])} cases validated.")
          EOF
