name: Refresh going-concern data

on:
  schedule:
    # Daily at 06:00 UTC (01:00 EST / 22:00 PST previous day)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: apps/api
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pipeline refresh
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          SEC_USER_AGENT_EMAIL: ${{ secrets.SEC_USER_AGENT_EMAIL }}
          # Pin to Haiku for scheduled runs — cost control; Sonnet not used
          CLASSIFIER_PRIMARY_MODEL: claude-haiku-4-5
          CLASSIFIER_FALLBACK_MODEL: claude-haiku-4-5
        run: |
          python -m gct.cli.refresh --trigger scheduled
