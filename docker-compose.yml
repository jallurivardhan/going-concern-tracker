version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gct
      POSTGRES_PASSWORD: gct_local
      POSTGRES_DB: gct_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
